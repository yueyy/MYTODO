<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日打卡日历</title>
  <style>
    :root {
      --bg-a: #fffaf3;
      --bg-b: #fef6ff;
      --card: #ffffff;
      --text: #3d3d3d;
      --muted: #8b8b8b;
      --sky: #d8ebff;
      --lav: #e9e0ff;
      --line: #f0eef5;
      --done: #2b8c63;
      --warn: #c97820;
      --danger: #f7c7d2;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--bg-a), var(--bg-b));
    }

    .auth-bar {
      max-width: 1000px;
      margin: 0 auto 14px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .auth-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .auth-title {
      font-size: 14px;
      font-weight: 700;
    }

    .auth-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
      max-width: 340px;
    }

    .auth-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      width: 100%;
      max-width: 520px;
    }

    .auth-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
    }

    .auth-form {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      width: 100%;
    }

    .auth-form.active {
      display: flex;
    }

    .auth-input {
      border: none;
      border-radius: 10px;
      background: #f7f7f9;
      padding: 8px 10px;
      font-size: 13px;
      width: 170px;
      color: var(--text);
    }

    .auth-user {
      font-size: 13px;
      color: var(--muted);
    }

    .auth-note {
      width: 100%;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      margin-top: -2px;
    }

    .sync-status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--done);
    }

    .sync-status.warn {
      color: var(--warn);
    }

    .app {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 14px;
    }

    .side-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1, h2, h3 { margin: 0; }

    .sub {
      color: var(--muted);
      margin-top: 6px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .month-title {
      font-weight: 700;
      font-size: 18px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      background: var(--lav);
      color: var(--text);
      font-size: 14px;
    }

    .btn.alt { background: var(--sky); }

    .btn.small {
      font-size: 12px;
      padding: 7px 10px;
    }

    .btn.danger {
      background: var(--danger);
    }

    .toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .toggle-btn.active {
      background: #cfe8ff;
      font-weight: 700;
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .day {
      min-height: 96px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 8px;
      background: #fff;
      cursor: pointer;
    }

    .day:hover { border-color: #e4d9ff; }

    .day.other {
      opacity: 0.42;
      background: #fcfcfc;
    }

    .day.selected {
      border-color: #ccb9ff;
      box-shadow: 0 0 0 2px #efe9ff inset;
    }

    .day-num {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .chip {
      display: inline-block;
      max-width: 100%;
      margin-bottom: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .more {
      font-size: 11px;
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .input {
      flex: 1;
      border: none;
      border-radius: 10px;
      background: #f7f7f9;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
    }

    .habit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      font-size: 14px;
    }

    .habit-main {
      min-width: 0;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .habit-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .stats-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      font-size: 14px;
      background: #fff;
    }

    .stats-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .stats-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .count {
      color: var(--done);
      font-weight: 700;
      flex-shrink: 0;
    }

    .stats-rate {
      color: var(--done);
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .done-tag {
      color: var(--done);
      font-size: 12px;
      margin-top: 8px;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .auth-stack { max-width: none; align-items: stretch; }
      .auth-actions, .auth-form { justify-content: flex-start; }
      .auth-note { text-align: left; }
      .auth-input { width: calc(50% - 4px); min-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="auth-bar">
    <div class="auth-main">
      <div>
        <div class="auth-title">账号同步（Supabase Free）</div>
        <div class="auth-sub" id="authHint">注册和登录都使用邮箱 + 密码。登录后自动同步到云端，电脑和 iPhone 可共用数据。</div>
      </div>
      <div class="auth-stack" id="authSignedOut">
        <div class="toggle auth-actions">
          <button class="btn alt toggle-btn active" data-auth-mode="login" id="authModeLogin">登录</button>
          <button class="btn alt toggle-btn" data-auth-mode="register" id="authModeRegister">注册</button>
        </div>
        <div class="auth-form active" id="loginForm">
          <input class="auth-input" id="loginEmailInput" type="email" placeholder="邮箱" />
          <input class="auth-input" id="loginPasswordInput" type="password" placeholder="密码" />
          <button class="btn small alt" id="signInBtn">登录</button>
        </div>
        <div class="auth-form" id="registerForm">
          <input class="auth-input" id="registerEmailInput" type="email" placeholder="邮箱" />
          <input class="auth-input" id="registerPasswordInput" type="password" placeholder="密码（至少6位）" />
          <button class="btn small" id="signUpBtn">注册</button>
        </div>
        <div class="auth-note" id="authModeNote">使用邮箱 + 密码登录</div>
      </div>
      <div class="auth-actions" id="authSignedIn" hidden>
        <span class="auth-user" id="userEmail"></span>
        <button class="btn small alt" id="pullBtn">拉取云端</button>
        <button class="btn small" id="logoutBtn">退出</button>
      </div>
    </div>
    <div class="sync-status" id="syncStatus">当前：仅本地模式</div>
  </div>

  <div class="app">
    <section class="card">
      <h1>每日打卡日历</h1>
      <div class="sub">by pmy</div>

      <div class="toolbar">
        <button class="btn alt" id="prevMonth">上个月</button>
        <div class="month-title" id="monthTitle"></div>
        <button class="btn alt" id="nextMonth">下个月</button>
      </div>

      <div class="week">
        <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
      </div>
      <div class="calendar" id="calendar"></div>
    </section>

    <div class="side-col">
      <section class="card">
        <h2 id="panelDate">今日</h2>
        <div class="sub">勾选这一天完成的项目</div>

        <div class="row">
          <input class="input" id="habitInput" placeholder="例如：喝水、运动、阅读" />
          <button class="btn" id="addBtn">新增项目</button>
        </div>

        <div id="habitList"></div>
        <div class="done-tag" id="doneSummary"></div>
      </section>

      <section class="card">
        <h2>计数板</h2>
        <div class="sub">统计每个事项完成了多少天</div>
        <div class="toggle">
          <button class="btn alt toggle-btn active" data-mode="month" id="modeMonth">按月</button>
          <button class="btn alt toggle-btn" data-mode="year" id="modeYear">按年</button>
        </div>
        <div class="sub" id="statsPeriod"></div>
        <div class="stats-rate" id="statsRate"></div>
        <div id="statsList"></div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const KEY = "checkin_app_v2";
    let state = normalizeState(JSON.parse(localStorage.getItem(KEY) || '{"habits":[],"records":{}}'));

    const SUPABASE_URL = "https://drkysmuegmcywznkqcdj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRya3lzbXVlZ21jeXd6bmtxY2RqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjk1MzcsImV4cCI6MjA4NzgwNTUzN30.P9To5w2L-sPsQnVbP3VuWx6ExWjC_eqIew-491VbTOE";
    const SUPABASE_TABLE = "checkin_state";

    let supabaseClient = null;
    let currentUser = null;
    let syncTimer = null;
    let authMode = "login";

    const habitColors = [
      "#ffd9c8",
      "#ccf3e6",
      "#d8ebff",
      "#e9e0ff",
      "#ffe7b8",
      "#ffd6e7",
      "#d9f0d0",
      "#fde2cc"
    ];

    const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
    const today = new Date();
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();
    let selectedDate = formatISO(today);
    let statsMode = "month";

    function normalizeState(raw) {
      const habits = Array.isArray(raw?.habits) ? raw.habits : [];
      const records = raw?.records && typeof raw.records === "object" ? raw.records : {};
      return { habits, records };
    }

    function saveLocal() {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function setStatus(text, isWarn = false) {
      const el = document.getElementById("syncStatus");
      el.textContent = text;
      el.classList.toggle("warn", isWarn);
    }

    function formatError(error) {
      if (!error) return "未知错误";
      if (typeof error === "string") return error;

      const parts = [];
      const message = error.message || error.msg || error.error_description || error.error || error.errMsg;
      const code = error.code || error.errCode || error.status;
      const requestId = error.requestId || error.request_id;

      if (message) parts.push(message);
      if (code) parts.push(`code: ${code}`);
      if (requestId) parts.push(`requestId: ${requestId}`);
      if (parts.length > 0) return parts.join(" | ");

      try {
        return JSON.stringify(error);
      } catch (_) {
        return String(error);
      }
    }

    function isSupabaseConfigured() {
      return SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
    }

    function setCurrentUser(user) {
      currentUser = user || null;
    }

    function getCurrentUid() {
      return currentUser?.id || "";
    }

    function getCurrentAccountName() {
      return currentUser?.email || getCurrentUid();
    }

    function save() {
      saveLocal();
      scheduleCloudSync();
    }

    function scheduleCloudSync() {
      if (!currentUser || !supabaseClient) return;
      if (syncTimer) clearTimeout(syncTimer);
      syncTimer = setTimeout(() => {
        pushStateToCloud();
      }, 300);
    }

    async function pushStateToCloud() {
      if (!currentUser || !supabaseClient) return;
      setStatus("同步中...");
      const { error } = await supabaseClient
        .from(SUPABASE_TABLE)
        .upsert({ user_id: currentUser.id, payload: normalizeState(state) }, { onConflict: "user_id" });

      if (error) {
        setStatus(`云同步失败：${formatError(error)}`, true);
        return;
      }
      setStatus("已同步到云端");
    }

    async function pullStateFromCloud() {
      if (!currentUser || !supabaseClient) return;
      setStatus("正在拉取云端数据...");
      const { data, error } = await supabaseClient
        .from(SUPABASE_TABLE)
        .select("payload")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      if (error) {
        setStatus(`拉取失败：${formatError(error)}`, true);
        return;
      }

      if (data?.payload) {
        state = normalizeState(data.payload);
        migrateHabitColors();
        saveLocal();
        rerenderAll();
        setStatus("已从云端拉取最新数据");
        return;
      }

      await pushStateToCloud();
    }

    function migrateHabitColors() {
      let changed = false;
      state.habits.forEach((h, index) => {
        if (!h.color) {
          h.color = habitColors[index % habitColors.length];
          changed = true;
        }
      });
      if (changed) saveLocal();
    }

    function formatISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseISO(isoDate) {
      const [y, m, d] = isoDate.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function setAuthMode(mode) {
      authMode = mode;
      document.querySelectorAll("[data-auth-mode]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.authMode === mode);
      });
      document.getElementById("loginForm").classList.toggle("active", mode === "login");
      document.getElementById("registerForm").classList.toggle("active", mode === "register");
      document.getElementById("authModeNote").textContent = mode === "login"
        ? "使用邮箱 + 密码登录"
        : "注册后建议直接用同一邮箱登录";
    }

    function getCompletedHabits(dateISO) {
      const rec = state.records[dateISO] || {};
      return state.habits.filter(h => rec[h.id]);
    }

    function setCheck(dateISO, habitId, checked) {
      state.records[dateISO] ||= {};
      state.records[dateISO][habitId] = checked;
      save();
    }

    function addHabit(name) {
      const color = habitColors[state.habits.length % habitColors.length];
      state.habits.push({ id: crypto.randomUUID(), name, color });
      save();
      rerenderAll();
    }

    function deleteHabit(habitId) {
      const habit = state.habits.find(item => item.id === habitId);
      if (!habit) return;
      if (!window.confirm(`删除项目「${habit.name}」？会同时删除所有历史打卡记录。`)) {
        return;
      }

      state.habits = state.habits.filter(item => item.id !== habitId);
      Object.keys(state.records).forEach(dateISO => {
        const rec = state.records[dateISO];
        if (!rec) return;
        delete rec[habitId];
        if (Object.keys(rec).length === 0) {
          delete state.records[dateISO];
        }
      });
      save();
      rerenderAll();
    }

    function renderCalendar() {
      const monthTitle = document.getElementById("monthTitle");
      const calendar = document.getElementById("calendar");
      monthTitle.textContent = `${viewYear}年 ${monthNames[viewMonth]}`;
      calendar.innerHTML = "";

      const first = new Date(viewYear, viewMonth, 1);
      const firstWeekday = (first.getDay() + 6) % 7;
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const daysPrevMonth = new Date(viewYear, viewMonth, 0).getDate();

      const cells = [];
      for (let i = 0; i < firstWeekday; i++) {
        const dayNum = daysPrevMonth - firstWeekday + i + 1;
        cells.push(new Date(viewYear, viewMonth - 1, dayNum));
      }
      for (let d = 1; d <= daysInMonth; d++) {
        cells.push(new Date(viewYear, viewMonth, d));
      }
      while (cells.length % 7 !== 0) {
        const nextDay = cells.length - (firstWeekday + daysInMonth) + 1;
        cells.push(new Date(viewYear, viewMonth + 1, nextDay));
      }

      cells.forEach(date => {
        const iso = formatISO(date);
        const completed = getCompletedHabits(iso);
        const isOtherMonth = date.getMonth() !== viewMonth;
        const isSelected = iso === selectedDate;

        const day = document.createElement("div");
        day.className = `day${isOtherMonth ? " other" : ""}${isSelected ? " selected" : ""}`;

        const chips = completed.slice(0, 3).map(h => `<div class="chip" style="background:${h.color}">${h.name}</div>`).join("");
        const more = completed.length > 3 ? `<div class="more">+${completed.length - 3}项</div>` : "";

        day.innerHTML = `
          <div class="day-num">${date.getDate()}</div>
          ${chips}
          ${more}
        `;

        day.addEventListener("click", () => {
          selectedDate = iso;
          renderCalendar();
          renderSidePanel();
        });

        calendar.appendChild(day);
      });
    }

    function renderSidePanel() {
      const panelDate = document.getElementById("panelDate");
      const habitList = document.getElementById("habitList");
      const doneSummary = document.getElementById("doneSummary");
      const rec = state.records[selectedDate] || {};

      panelDate.textContent = selectedDate;
      habitList.innerHTML = "";

      state.habits.forEach(h => {
        const checked = !!rec[h.id];
        const row = document.createElement("div");
        row.className = "habit-item";
        row.style.background = h.color;
        row.innerHTML = `
          <div class="habit-main">${h.name}</div>
          <div class="habit-actions">
            <input type="checkbox" ${checked ? "checked" : ""} />
            <button class="btn small danger" type="button">删除</button>
          </div>
        `;

        row.querySelector("input").addEventListener("change", (e) => {
          setCheck(selectedDate, h.id, e.target.checked);
          renderCalendar();
          renderSidePanel();
          renderStats();
        });

        row.querySelector("button").addEventListener("click", () => {
          deleteHabit(h.id);
        });

        habitList.appendChild(row);
      });

      const done = state.habits.filter(h => rec[h.id]).length;
      doneSummary.textContent = `完成进度：${done}/${state.habits.length}`;
    }

    function isInPeriod(dateISO) {
      const d = parseISO(dateISO);
      if (statsMode === "month") {
        return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
      }
      return d.getFullYear() === viewYear;
    }

    function getHabitCountInPeriod(habitId) {
      let count = 0;
      Object.entries(state.records).forEach(([dateISO, rec]) => {
        if (!isInPeriod(dateISO)) return;
        if (rec && rec[habitId]) count += 1;
      });
      return count;
    }

    function getPeriodDayCount() {
      if (statsMode === "month") {
        return new Date(viewYear, viewMonth + 1, 0).getDate();
      }
      return new Date(viewYear, 1, 29).getMonth() === 1 ? 366 : 365;
    }

    function getOverallRate(counts) {
      const habitsLen = state.habits.length;
      const totalPossible = getPeriodDayCount() * habitsLen;
      if (totalPossible === 0) return "0.0%";
      const totalDone = counts.reduce((sum, item) => sum + item.count, 0);
      return `${((totalDone / totalPossible) * 100).toFixed(1)}%`;
    }

    function renderStats() {
      const statsList = document.getElementById("statsList");
      const statsPeriod = document.getElementById("statsPeriod");
      const statsRate = document.getElementById("statsRate");

      statsPeriod.textContent = statsMode === "month"
        ? `${viewYear}年 ${monthNames[viewMonth]}`
        : `${viewYear}年`;

      document.querySelectorAll(".toggle-btn").forEach(btn => {
        if (!btn.dataset.mode) return;
        btn.classList.toggle("active", btn.dataset.mode === statsMode);
      });

      statsList.innerHTML = "";

      if (state.habits.length === 0) {
        statsRate.textContent = "总完成率：0.0%";
        statsList.innerHTML = '<div class="sub">暂无事项，请先新增项目</div>';
        return;
      }

      const counts = state.habits.map(h => ({
        habit: h,
        count: getHabitCountInPeriod(h.id)
      }));

      counts.sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return a.habit.name.localeCompare(b.habit.name, "zh-CN");
      });

      statsRate.textContent = `总完成率：${getOverallRate(counts)}`;

      counts.forEach(item => {
        const row = document.createElement("div");
        row.className = "stats-item";
        row.innerHTML = `
          <div class="stats-left">
            <span class="swatch" style="background:${item.habit.color}"></span>
            <span class="stats-name">${item.habit.name}</span>
          </div>
          <span class="count">${item.count}天</span>
        `;
        statsList.appendChild(row);
      });
    }

    function rerenderAll() {
      renderCalendar();
      renderSidePanel();
      renderStats();
    }

    function updateAuthUI() {
      const signedIn = !!currentUser;
      document.getElementById("authSignedOut").hidden = signedIn;
      document.getElementById("authSignedIn").hidden = !signedIn;
      document.getElementById("userEmail").textContent = signedIn ? `已登录：${getCurrentAccountName()}` : "";

      if (!isSupabaseConfigured()) {
        document.getElementById("authHint").textContent = "请先在代码中填入 Supabase URL 和 Anon Key";
        setStatus("当前：仅本地模式（未配置 Supabase）", true);
        return;
      }

      document.getElementById("authHint").textContent = signedIn
        ? "当前设备改动会自动同步到云端"
        : "注册和登录都使用邮箱 + 密码。登录后自动同步到云端，电脑和 iPhone 可共用数据。";

      if (!signedIn) {
        setStatus("已配置 Supabase，等待登录");
      }
    }

    async function signUp() {
      if (!supabaseClient) return;
      const email = document.getElementById("registerEmailInput").value.trim();
      const password = document.getElementById("registerPasswordInput").value;
      if (!email || !password) {
        setStatus("请输入邮箱和密码", true);
        return;
      }
      if (password.length < 6) {
        setStatus("密码至少 6 位", true);
        return;
      }

      setStatus("注册中...");
      const { error } = await supabaseClient.auth.signUp({ email, password });
      if (error) {
        setStatus(`注册失败：${formatError(error)}`, true);
        return;
      }
      setStatus("注册成功。如开启邮箱验证，请先完成邮箱验证后再登录");
    }

    async function signIn() {
      if (!supabaseClient) return;
      const email = document.getElementById("loginEmailInput").value.trim();
      const password = document.getElementById("loginPasswordInput").value;
      if (!email || !password) {
        setStatus("请输入邮箱和密码", true);
        return;
      }

      setStatus("登录中...");
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        setStatus(`登录失败：${formatError(error)}`, true);
        return;
      }
      setCurrentUser(data?.user || null);
      updateAuthUI();
      await pullStateFromCloud();
    }

    async function signOut() {
      if (!supabaseClient) return;
      const { error } = await supabaseClient.auth.signOut();
      if (error) {
        setStatus(`退出失败：${formatError(error)}`, true);
        return;
      }
      setCurrentUser(null);
      updateAuthUI();
      setStatus("已退出，当前仅本地数据");
    }

    async function initSupabase() {
      if (!isSupabaseConfigured()) {
        updateAuthUI();
        return;
      }
      if (!window.supabase || !window.supabase.createClient) {
        setStatus("Supabase SDK 加载失败", true);
        return;
      }

      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        setStatus(`Supabase 初始化失败：${formatError(error)}`, true);
      }
      setCurrentUser(data?.session?.user || null);
      updateAuthUI();

      if (currentUser) {
        await pullStateFromCloud();
      }

      supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        setCurrentUser(session?.user || null);
        updateAuthUI();
        if (currentUser) {
          await pullStateFromCloud();
        }
      });
    }

    document.getElementById("addBtn").addEventListener("click", () => {
      const input = document.getElementById("habitInput");
      const name = input.value.trim();
      if (!name) return;
      addHabit(name);
      input.value = "";
    });

    document.getElementById("prevMonth").addEventListener("click", () => {
      if (viewMonth === 0) {
        viewMonth = 11;
        viewYear -= 1;
      } else {
        viewMonth -= 1;
      }
      renderCalendar();
      renderStats();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      if (viewMonth === 11) {
        viewMonth = 0;
        viewYear += 1;
      } else {
        viewMonth += 1;
      }
      renderCalendar();
      renderStats();
    });

    document.querySelectorAll("[data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        statsMode = btn.dataset.mode;
        renderStats();
      });
    });

    document.querySelectorAll("[data-auth-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        setAuthMode(btn.dataset.authMode);
      });
    });

    document.getElementById("signUpBtn").addEventListener("click", signUp);
    document.getElementById("signInBtn").addEventListener("click", signIn);
    document.getElementById("logoutBtn").addEventListener("click", signOut);
    document.getElementById("pullBtn").addEventListener("click", pullStateFromCloud);

    window.addEventListener("focus", () => {
      if (currentUser) pullStateFromCloud();
    });

    migrateHabitColors();
    setAuthMode("login");
    rerenderAll();
    initSupabase();
  </script>
</body>
</html>
